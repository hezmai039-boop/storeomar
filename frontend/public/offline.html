<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas — غير متصل</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        font-family: "Segoe UI", Tahoma, "Noto Sans Arabic", Arial, sans-serif;
        background: linear-gradient(135deg, #a463f7 0%, #7c3aed 45%, #5622c9 100%);
        color: #fff; text-align: center; padding: 24px;
      }
      .card {
        background: rgba(255,255,255,0.12); backdrop-filter: blur(14px);
        border: 1px solid rgba(255,255,255,0.25); border-radius: 20px;
        padding: 36px 28px; max-width: 380px;
      }
      h1 { font-size: 20px; margin: 16px 0 8px; }
      p { font-size: 14px; line-height: 1.7; opacity: 0.9; margin: 0 0 22px; }
      button {
        background: #fff; color: #5b21b6; border: none; border-radius: 999px;
        padding: 12px 28px; font-size: 14px; font-weight: 700; cursor: pointer;
      }
      .logo { width: 64px; height: 64px; }
    </style>
  </head>
  <body>
    <div class="card">
      <svg class="logo" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="512" rx="112" fill="rgba(255,255,255,0.15)"/>
        <path d="M256 104 L360 400 L306 400 L286 340 L226 340 L206 400 L152 400 Z M241 296 L271 296 L256 250 Z" fill="#fff"/>
      </svg>
      <h1>لا يوجد اتصال بالإنترنت</h1>
      <p>تطبيق Atlas يحتاج اتصالاً بالشبكة لعرض المحادثات والطلبات المحدّثة. تحقّق من اتصالك ثم أعد المحاولة.</p>
      <button onclick="location.reload()">إعادة المحاولة</button>
    </div>
  </body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Atlas">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a463f7"/>
      <stop offset="0.45" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#5622c9"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ede4ff"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed rounded square so it renders well as a maskable icon. -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Stylized "A" (Atlas) built from two struts + crossbar. -->
  <path d="M256 104 L360 400 L306 400 L286 340 L226 340 L206 400 L152 400 Z
           M241 296 L271 296 L256 250 Z"
        fill="url(#mark)"/>
  <!-- Orbit ring nods to the "atlas / platform" idea without external assets. -->
  <ellipse cx="256" cy="256" rx="150" ry="60"
           fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="10"
           transform="rotate(-24 256 256)"/>
</svg>
